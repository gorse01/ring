<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wagner Ring — Leitmotif Ear Training</title>
<meta name="description" content="Learn and quiz yourself on all 71 leitmotifs of Wagner's Ring Cycle with real orchestral recordings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070b; --surface: #0f0f15;
    --border: rgba(160,130,90,0.15); --border-hover: rgba(160,130,90,0.45);
    --gold: #a0825a; --gold-bright: #d4a96a;
    --text: #ddd5c8; --text-muted: #8a7e6e; --text-dim: #5a5048;
    --correct: rgba(90,154,84,0.5); --correct-bg: rgba(90,154,84,0.1); --correct-text: #a8d4a0;
    --wrong: rgba(160,64,64,0.5); --wrong-bg: rgba(160,64,64,0.1); --wrong-text: #d4a0a0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Garamond,Georgia,serif;min-height:100vh;min-height:100dvh}
  button{font-family:inherit;outline:none}
  button:focus-visible{box-shadow:0 0 0 2px var(--gold)}
  .glow{position:fixed;inset:0;opacity:.03;pointer-events:none;background-image:radial-gradient(circle at 50% 0%,rgba(160,130,90,.3),transparent 60%)}
  .wrap{max-width:640px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}
  header{text-align:center;margin-bottom:36px}
  .kicker{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
  h1{font-size:30px;font-weight:400;color:var(--text);line-height:1.2}
  .rule{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto}
  .tagline{font-size:13px;color:var(--text-muted);font-style:italic}
  .btn{display:block;width:100%;padding:14px 20px;font-size:16px;cursor:pointer;border:1px solid var(--border);background:rgba(160,130,90,.04);color:var(--text);border-radius:3px;transition:all .25s ease;text-align:left;line-height:1.4}
  .btn:hover{border-color:var(--border-hover);background:rgba(160,130,90,.1)}
  .btn.primary{border-color:var(--border-hover);background:rgba(160,130,90,.12);color:var(--gold-bright)}
  .btn:disabled{opacity:.5;cursor:default}
  .screen{animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px 20px;text-align:center}
  .card h2{font-size:24px;font-weight:400;color:var(--gold-bright);margin-bottom:16px}
  .motif-num{font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:4px}
  .card .desc{font-size:15px;line-height:1.8;color:var(--text-muted);text-align:left;margin-top:14px}
  .major-star{color:var(--gold-bright);margin-left:4px}
  .yt-wrap{position:relative;width:100%;max-width:400px;margin:0 auto 10px;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:6px;border:1px solid var(--border);background:#000}
  .yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
  .yt-quiz{position:relative;width:100%;max-width:400px;margin:0 auto 10px;height:54px;overflow:hidden;border-radius:4px;border:1px solid var(--border);background:#000}
  .yt-quiz iframe{position:absolute;bottom:0;left:0;width:100%;height:250px;border:none}
  .yt-hint{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:4px}
  .progress{display:flex;align-items:center;gap:12px;margin-bottom:26px}
  .progress-track{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
  .progress-fill{height:100%;background:var(--gold);border-radius:1px;transition:width .5s ease}
  .progress-n{font-size:13px;color:var(--text-dim)}
  .question{font-size:19px;font-weight:400;color:var(--text);margin-bottom:16px;text-align:center}
  .opts{display:flex;flex-direction:column;gap:7px}
  .opt{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;background:rgba(160,130,90,.04);border:1px solid var(--border);border-radius:3px;cursor:pointer;color:var(--text);font-family:inherit;font-size:16px;text-align:left;transition:all .25s ease;line-height:1.4}
  .opt:hover:not(:disabled):not(.correct):not(.wrong){border-color:var(--border-hover)}
  .opt:disabled{cursor:default}
  .opt.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct-text)}
  .opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong-text)}
  .opt.dim{opacity:.3}
  .letter{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(160,130,90,.2);font-size:11px;color:var(--text-dim)}
  .opt.correct .letter{border-color:var(--correct);color:var(--correct-text);background:rgba(90,154,84,.12)}
  .opt.wrong .letter{border-color:var(--wrong);color:var(--wrong-text)}
  .opera-label{font-size:12px;color:var(--text-dim);margin-top:2px}
  .expl{margin-top:16px;padding:14px 16px;background:rgba(160,130,90,.05);border-left:2px solid var(--gold);border-radius:0 3px 3px 0;font-size:14px;line-height:1.7;color:var(--text-muted);animation:fadeIn .4s ease}
  .expl strong{color:var(--gold-bright)}
  .r-score{font-size:42px;font-weight:400}
  .r-rank{font-size:16px;color:var(--gold);font-style:italic;margin-bottom:30px}
  .r-item{padding:9px 12px;margin-bottom:4px;border-radius:3px;font-size:14px;display:flex;gap:10px;align-items:center;color:var(--text-muted)}
  .r-item.pass{background:rgba(90,154,84,.05);border-left:2px solid rgba(90,154,84,.4)}
  .r-item.fail{background:rgba(160,64,64,.05);border-left:2px solid rgba(160,64,64,.4)}
  .row{display:flex;gap:10px;margin-top:12px}.row .btn{text-align:center}
  .frow{display:flex;gap:8px;flex-wrap:wrap}.frow .btn{flex:1 1 45%;text-align:center}
  .back-link{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:0;margin-bottom:18px;font-family:inherit}
  .muted-sm{font-size:13px;color:var(--text-muted);margin-top:4px}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;justify-content:center}
  .pill{padding:6px 14px;font-size:13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .2s ease}
  .pill:hover{border-color:var(--border-hover)}
  .pill.on{border-color:var(--gold);color:var(--gold-bright);background:rgba(160,130,90,.1)}
  .setting{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:15px;color:var(--text-muted)}
  .setting select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:6px 10px;font-family:inherit;font-size:14px;-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap" id="app"></div>
<script>
const M=[
{id:"1",n:"Genesis / Nature",o:"Das Rheingold",d:"The beginning of the world and development of the universe from the primal nothingness.",v:"CzFdrDju4Zw",x:true},
{id:"2",n:"Nature / Rhine",o:"Das Rheingold",d:"A continuation of the Genesis motif with the gaps filled. Part of the revival music at the beginning of Götterdämmerung.",v:"4ATmAIo6lHQ",x:true},
{id:"3",n:"Rhinemaidens",o:"Das Rheingold",d:"Carefree, innocent, amoral, capricious. Appears at the end of Götterdämmerung when the maidens burst their banks to extinguish the conflagration.",v:"8K0b6tXaJ0E",x:false},
{id:"4",n:"Scurrying",o:"Das Rheingold",d:"Mime, a pitiable, wretched Nibelheim dwarf, and Alberich hopping when he turns himself into a toad.",v:"dCtA-Y7n6Ck",x:false},
{id:"5",n:"Alberich",o:"Das Rheingold",d:"The villain of the Cycle.",v:"lgilMP2ZCVs",x:false},

{id:"7",n:"Gold",o:"Das Rheingold",d:"A fanfare because the gold is always the centre of attention.",v:"uJezi1sD4q4",x:true},
{id:"8",n:"Rheingold",o:"Das Rheingold",d:"This bright exclamation proclaims the Rhinemaidens' delight and joy in the gold they are charged with guarding.",v:"7o1n81V5wcw",x:true},
{id:"9",n:"Rhine Wave",o:"Das Rheingold",d:"The fast-flowing river Rhine.",v:"t_c0Kzn_k0Y",x:true},
{id:"10",n:"Renunciation of Love",o:"Das Rheingold",d:"The renunciation or cursing of love, usually for the sake of power or riches. Alberich, Wotan and Siegmund all fall prey to it.",v:"VKr9f4AxPg8",x:true},
{id:"11",n:"The Ring",o:"Das Rheingold",d:"The Ring motif.",v:"cZpYG6l6s4A",x:true},
{id:"12a",n:"Valhalla (first segment)",o:"Das Rheingold",d:"The first of three segments to the Valhalla motif representing the gods' palace.",v:"Man7MwIHYSw",x:true},

{id:"13",n:"Wotan's Spear",o:"Das Rheingold",d:"Wotan has no motif but his spear, hewn from a branch of the world ash tree, symbolises his power and the power of the Gods.",v:"yvXDyBeaP-4",x:true},
{id:"14",n:"Enchantment",o:"Das Rheingold",d:"Fricka must enchant her husband Wotan to retain him.",v:"5L673ONCuEY",x:false},
{id:"15",n:"Freia",o:"Das Rheingold",d:"Freia is the goddess of love. She is pursued by the Giants.",v:"Tk2b5eiq8hg",x:true},

{id:"17",n:"Irrevocable Law",o:"Das Rheingold",d:"The second segment of the Spear motif. Fasolt the giant reminds Wotan that he must honour their agreement.",v:"4HMH2ukEOtM",x:false},

{id:"21",n:"Loge",o:"Das Rheingold",d:"Loge, god of fire, is the most cunning of the immortals. Like fire itself, the motif is chaotic and uncontrollable.",v:"OZG70F2ob_k",x:false},

{id:"23",n:"Wave Motion",o:"Das Rheingold",d:"A slowed-down version of the Rhine Wave motif.",v:"LnuLXg0Vl0Y",x:false},
{id:"24",n:"Nibelheim",o:"Das Rheingold",d:"Nibelheim is the Dwarves' underground city where dangerous things are made.",v:"uFO5ck1vaSE",x:true},
{id:"25",n:"Tarnhelm",o:"Das Rheingold",d:"A magical helmet that gets its power from the Ring. It allows the wearer to take on any shape and to teleport.",v:"N82zEAbWyT4",x:false},

{id:"27",n:"Power of the Ring",o:"Das Rheingold",d:"A cruel mutation of the Rheingold motif. It reminds us that the Ring's power hangs over all events.",v:"9a69d4zEO94",x:true},
{id:"28",n:"Treasure",o:"Das Rheingold",d:"The Nibelung hoard of treasure.",v:"XnQNHcVcVIg",x:false},

{id:"32",n:"Curse",o:"Das Rheingold",d:"Alberich lays a curse on the Ring. Everyone will want it; owners plagued with sorrow; wearers will die; the envious consumed.",v:"7goTVlreE68",x:true},

{id:"34",n:"Götterdämmerung",o:"Das Rheingold",d:"The downfall of the gods.",v:"nEnCZMmpuNo",x:true},
{id:"35",n:"Thunder",o:"Das Rheingold",d:"Donner is the god of thunder.",v:"YS7Sf-Hf5lg",x:true},
{id:"36",n:"Rainbow",o:"Das Rheingold",d:"This glittering motif is only heard once, at the end of Das Rheingold.",v:"CX2OhueZ-3Y",x:true},
{id:"37",n:"Sword",o:"Das Rheingold",d:"Nothung is Wotan's enchanted sword, given to Siegmund, shattered by Wotan, reforged by Siegfried and used to slay Fafner.",v:"XhM5UkVVmxA",x:true},
{id:"38",n:"Purpose of the Sword",o:"Das Rheingold",d:"Wotan's vision for the sword, Nothung.",v:"-sn6rDtKAN4",x:false},

{id:"43",n:"The Drink",o:"Die Walküre",d:"Siegmund requests from Sieglinde a drink which gives him strength. Their love is growing.",v:"ne0dfE3vmvA",x:true},
{id:"44",n:"Love",o:"Die Walküre",d:"Love blossoms between the twins.",v:"uZwW6413RO8",x:true},
{id:"45",n:"Wälsung Unhappiness",o:"Die Walküre",d:"A sadness hangs over the Wälsung race: the twins separated, mother dead, father missing.",v:"MOo3juYj77g",x:false},
{id:"46",n:"Hunding",o:"Die Walküre",d:"Sieglinde's vile husband.",v:"Ez6csdco4O0",x:true},
{id:"47",n:"Obligation",o:"Die Walküre",d:"The obligatory welcome Hunding gives to Siegmund. Later used by Wotan.",v:"KZ-F3SArBtY",x:false},
{id:"48",n:"Wehwalt (Woe)",o:"Die Walküre",d:"Siegmund does not know who he is and has named himself 'Woe'. Heard at Siegfried's funeral march.",v:"CBX7nLAjr0E",x:true},
{id:"49",n:"Wälsung Tribe",o:"Die Walküre",d:"Siegmund and Sieglinde are from the Wälsung race.",v:"QoFvyEEIsQo",x:false},
{id:"50",n:"Spring Song",o:"Die Walküre",d:"Siegmund's joy at finding his name, his sister and his love.",v:"7nWkQowfZwQ",x:true},
{id:"51",n:"Bliss",o:"Die Walküre",d:"Sieglinde's joy at having found love with Siegmund.",v:"UorSinljfqg",x:false},
{id:"52",n:"Nothung",o:"Die Walküre",d:"The magic sword Nothung (Needful), embedded in the tree growing through the house of Sieglinde and Hunding.",v:"TvQ1bmmtBro",x:false},
{id:"53",n:"Ride of the Valkyries",o:"Die Walküre",d:"The Valkyries ride onto the battlefield to collect the souls of dead heroes for Valhalla.",v:"qSVv1uk57Jo",x:true},
{id:"54",n:"Valkyrie Call",o:"Die Walküre",d:"They call one another and express a joie de vivre.",v:"DLlR-sx2G9M",x:true},
{id:"55",n:"Fricka's Anger",o:"Die Walküre",d:"Fricka, goddess of marriage, is angry with the twins. She tells Wotan that Siegmund must die.",v:"sns84sy2UrA",x:false},
{id:"56",n:"Wotan's Frustration",o:"Die Walküre",d:"Despite his power, Wotan is forced to do things he doesn't want to do.",v:"mGywnlF9CRc",x:false},
{id:"57",n:"Need of the Gods",o:"Die Walküre",d:"Combines three motifs: Erda, Götterdämmerung and Wotan's Frustration.",v:"hpsUEONF6Ys",x:false},

{id:"61",n:"Crisis",o:"Die Walküre",d:"The calamity when Siegmund is killed and in Siegfried's Funeral March.",v:"1xtbmc99-f0",x:false},

{id:"67",n:"Reproach",o:"Die Walküre",d:"Brünnhilde reproaches Wotan. Contains part of the Spear motif, inverts Wotan's Frustration.",v:"414afDmvsFE",x:false},

const OPS=["Das Rheingold","Die Walküre"];
const QNS=[10,15,25,40];
const app=document.getElementById('app');
let S={scr:'menu',qs:[],qi:0,sel:null,show:false,score:0,hist:[],li:0,filter:null,qLen:15,xOnly:false};

function set(p){Object.assign(S,p);draw()}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function pool(){let f=M;if(S.filter)f=f.filter(m=>m.o===S.filter);if(S.xOnly)f=f.filter(m=>m.x);return f}

function hdr(){return`<header><div class="kicker">Der Ring des Nibelungen</div><h1>Leitmotif Ear Training</h1><div class="rule"></div><p class="tagline">${M.length} motifs · orchestral recordings · Grange Park Opera</p></header>`}
function yt(v,q){const s=`https://www.youtube.com/embed/${v}?modestbranding=1&rel=0&playsinline=1&fs=0&iv_load_policy=3`;return q?`<div class="yt-quiz"><iframe src="${s}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div><p class="yt-hint">Tap the play bar to listen</p>`:`<div class="yt-wrap"><iframe src="${s}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`}

function drawMenu(){
  const p=pool(),mx=Math.min(S.qLen,p.length);
  app.innerHTML=`${hdr()}<div class="screen" style="display:flex;flex-direction:column;gap:14px">
  <div style="margin-bottom:4px">
    <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px">Quiz settings</div>
    <div class="setting"><span>Opera</span><select onchange="set({filter:this.value||null})">
      <option value="" ${!S.filter?'selected':''}>All (${M.length})</option>
      ${OPS.map(o=>`<option value="${o}" ${S.filter===o?'selected':''}>${o} (${M.filter(m=>m.o===o).length})</option>`).join('')}
    </select></div>
    <div class="setting"><span>Major motifs only</span><select onchange="set({xOnly:this.value==='1'})">
      <option value="0" ${!S.xOnly?'selected':''}>No — all motifs</option>
      <option value="1" ${S.xOnly?'selected':''}>Yes — ★ starred only</option>
    </select></div>
    <div class="setting" style="border:none"><span>Questions</span><select onchange="set({qLen:+this.value})">
      ${QNS.map(n=>`<option value="${n}" ${S.qLen===n?'selected':''}>${n}</option>`).join('')}
      <option value="999" ${S.qLen>=100?'selected':''}>All (${p.length})</option>
    </select></div>
    <div style="font-size:12px;color:var(--text-dim);margin-top:8px;text-align:center">${p.length} motifs in pool · quiz will use ${Math.min(mx,p.length)}</div>
  </div>
  <button class="btn primary" onclick="startQuiz()" ${p.length<2?'disabled':''}><div style="font-size:18px;text-align:center">Test Your Ear</div></button>
  <button class="btn" onclick="startLearn()"><div style="font-size:18px;text-align:center">Learn the Motifs</div></button>
  </div>`;
}

function drawLearn(){
  const p=pool(),m=p[S.li]||p[0],i=p.indexOf(m);
  app.innerHTML=`${hdr()}<div class="screen">
  <button class="back-link" onclick="set({scr:'menu',li:0})">← Back</button>
  <div class="filters">
    <button class="pill ${!S.filter&&!S.xOnly?'on':''}" onclick="set({filter:null,xOnly:false,li:0})">All</button>
    ${OPS.map(o=>`<button class="pill ${S.filter===o?'on':''}" onclick="set({filter:'${o}',li:0})">${o.replace('Das ','').replace('Die ','')}</button>`).join('')}
    <button class="pill ${S.xOnly?'on':''}" onclick="set({xOnly:!S.xOnly,li:0})">★ Major</button>
  </div>
  <div style="display:flex;justify-content:space-between;margin-bottom:14px">
    <span style="font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim)">${i+1} of ${p.length}</span>
    <span style="font-size:12px;color:var(--text-muted)">${m.o}</span>
  </div>
  <div class="card">
    <div class="motif-num">MOTIF ${m.id}${m.x?'<span class="major-star">★</span>':''}</div>
    <h2>${m.n}</h2>
    ${yt(m.v,false)}
    <p class="desc">${m.d}</p>
  </div>
  <div class="row">
    <button class="btn" ${i===0?'disabled':''} onclick="lP()">← Previous</button>
    <button class="btn" ${i===p.length-1?'disabled':''} onclick="lN()">Next →</button>
  </div></div>`;
}

function drawQuiz(){
  const q=S.qs[S.qi],r=S.show,pct=((S.qi+(r?1:0))/S.qs.length)*100;
  const os=q.opts.map((o,i)=>{
    const sl=S.sel===i,co=i===q.ci;let c='opt',L=String.fromCharCode(65+i);
    if(r&&co){c+=' correct';L='✓'}else if(r&&sl&&!co){c+=' wrong';L='✗'}else if(r&&!co&&!sl)c+=' dim';
    return`<button class="${c}" ${r?'disabled':''} onclick="ans(${i})"><span class="letter">${L}</span><span><div>${o.n}</div><div class="opera-label">${o.o}</div></span></button>`;
  }).join('');
  let ex='';if(r)ex=`<div class="expl"><strong>${q.m.n}</strong> — ${q.m.d}</div><button class="btn primary" style="margin-top:14px;text-align:center" onclick="nxt()">${S.qi+1>=S.qs.length?'See Results':'Next Motif →'}</button>`;
  app.innerHTML=`${hdr()}<div class="screen">
  <div class="progress"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-n">${S.qi+1}/${S.qs.length}</span></div>
  <h2 class="question">Which leitmotif is this?</h2>
  ${yt(q.m.v,true)}<div style="height:14px"></div>
  <div class="opts">${os}</div>${ex}</div>`;
}

function drawResults(){
  const pct=Math.round(S.score/S.qs.length*100);
  const rk=pct===100?'Brünnhilde — you hear every thread':pct>=80?'Wotan — deep knowledge, a few blind spots':pct>=60?'Siegfried — bold but still learning':pct>=40?'Mime — you know pieces, not the whole':'Rhinemaiden — the gold awaits discovery';
  const em=pct>=80?'🔥':pct>=60?'⚔':pct>=40?'♪':'🌊';
  const it=S.hist.map(h=>`<div class="r-item ${h.ok?'pass':'fail'}"><span style="color:${h.ok?'var(--correct-text)':'var(--wrong-text)'};flex-shrink:0">${h.ok?'✓':'✗'}</span>${h.n}</div>`).join('');
  app.innerHTML=`${hdr()}<div class="screen" style="text-align:center">
  <div style="font-size:48px;margin-bottom:10px;opacity:.75">${em}</div>
  <div class="r-score">${S.score}/${S.qs.length}</div>
  <div class="r-rank">${rk}</div>
  <div style="text-align:left;margin-bottom:24px">${it}</div>
  <div class="frow">
    <button class="btn primary" onclick="startQuiz()">Try Again</button>
    <button class="btn" onclick="startLearn()">Study Motifs</button>
    <button class="btn" onclick="set({scr:'menu'})" style="flex:1 1 100%">Menu</button>
  </div></div>`;
}

function draw(){({menu:drawMenu,learn:drawLearn,quiz:drawQuiz,results:drawResults})[S.scr]();window.scrollTo(0,0)}

function startQuiz(){
  const p=pool();if(p.length<2)return;
  const n=Math.min(S.qLen,p.length),ch=shuffle(p).slice(0,n);
  const qs=ch.map(m=>{
    let cands=p.filter(x=>x.id!==m.id);
    const same=cands.filter(x=>x.o===m.o),diff=cands.filter(x=>x.o!==m.o);
    let w=same.length>=3?shuffle(same).slice(0,3):[...same,...shuffle(diff).slice(0,3-same.length)];
    const opts=shuffle([m,...w.slice(0,3)]);
    return{m,opts,ci:opts.findIndex(o=>o.id===m.id)};
  });
  set({scr:'quiz',qs,qi:0,sel:null,show:false,score:0,hist:[]});
}
function startLearn(){set({scr:'learn',li:0})}
function lP(){if(S.li>0)set({li:S.li-1})}
function lN(){const p=pool();if(S.li<p.length-1)set({li:S.li+1})}
function ans(i){if(S.sel!==null)return;const q=S.qs[S.qi],ok=i===q.ci;set({sel:i,show:true,score:S.score+(ok?1:0),hist:[...S.hist,{ok,n:q.m.n}]})}
function nxt(){if(S.qi+1>=S.qs.length)set({scr:'results'});else set({qi:S.qi+1,sel:null,show:false})}

draw();
</script>
</body>
</html>
