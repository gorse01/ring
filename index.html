<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wagner Ring — Leitmotif Ear Training</title>
<meta name="description" content="Learn and quiz yourself on the leitmotifs of Wagner's Ring Cycle with real orchestral recordings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070b;
    --surface: #0f0f15;
    --border: rgba(160,130,90,0.15);
    --border-hover: rgba(160,130,90,0.45);
    --gold: #a0825a;
    --gold-bright: #d4a96a;
    --text: #ddd5c8;
    --text-muted: #8a7e6e;
    --text-dim: #5a5048;
    --correct: rgba(90,154,84,0.5);
    --correct-bg: rgba(90,154,84,0.1);
    --correct-text: #a8d4a0;
    --wrong: rgba(160,64,64,0.5);
    --wrong-bg: rgba(160,64,64,0.1);
    --wrong-text: #d4a0a0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Garamond, Georgia, serif;
    min-height: 100vh; min-height: 100dvh;
  }
  button { font-family: inherit; outline: none; }
  button:focus-visible { box-shadow: 0 0 0 2px var(--gold); }

  .glow {
    position: fixed; inset: 0; opacity: 0.03; pointer-events: none;
    background-image: radial-gradient(circle at 50% 0%, rgba(160,130,90,0.3), transparent 60%);
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

  /* Header */
  header { text-align: center; margin-bottom: 36px; }
  .kicker { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
  h1 { font-size: 30px; font-weight: 400; color: var(--text); line-height: 1.2; }
  .rule { width: 48px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 12px auto; }
  .tagline { font-size: 13px; color: var(--text-muted); font-style: italic; }

  /* Buttons */
  .btn {
    display: block; width: 100%; padding: 14px 20px; font-size: 16px;
    cursor: pointer; border: 1px solid var(--border); background: rgba(160,130,90,0.04);
    color: var(--text); border-radius: 3px; transition: all 0.25s ease;
    text-align: left; line-height: 1.4;
  }
  .btn:hover { border-color: var(--border-hover); background: rgba(160,130,90,0.1); }
  .btn.primary { border-color: var(--border-hover); background: rgba(160,130,90,0.12); color: var(--gold-bright); }
  .btn:disabled { opacity: 0.5; cursor: default; }

  /* Animations */
  .screen { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Card */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 24px 20px; text-align: center;
  }
  .card h2 { font-size: 24px; font-weight: 400; color: var(--gold-bright); margin-bottom: 16px; }
  .motif-num { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 4px; }
  .card .desc { font-size: 15px; line-height: 1.8; color: var(--text-muted); text-align: left; margin-top: 14px; }

  /* YouTube embed */
  .yt-wrap {
    position: relative; width: 100%; max-width: 400px; margin: 0 auto 10px;
    padding-bottom: 56.25%; /* 16:9 */ height: 0; overflow: hidden;
    border-radius: 6px; border: 1px solid var(--border); background: #000;
  }
  .yt-wrap iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
  }
  .yt-hint { font-size: 12px; color: var(--text-dim); text-align: center; margin-bottom: 4px; }

  /* Quiz: hide video in quiz mode — show only audio bar */
  .yt-quiz {
    position: relative; width: 100%; max-width: 400px; margin: 0 auto 10px;
    height: 54px; overflow: hidden;
    border-radius: 4px; border: 1px solid var(--border); background: #000;
  }
  .yt-quiz iframe {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 250px; border: none;
  }

  /* Progress */
  .progress { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
  .progress-track { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.5s ease; }
  .progress-n { font-size: 13px; color: var(--text-dim); }

  .question { font-size: 19px; font-weight: 400; color: var(--text); margin-bottom: 16px; text-align: center; }

  /* Options */
  .opts { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 12px 14px; background: rgba(160,130,90,0.04); border: 1px solid var(--border);
    border-radius: 3px; cursor: pointer; color: var(--text); font-family: inherit;
    font-size: 16px; text-align: left; transition: all 0.25s ease; line-height: 1.4;
  }
  .opt:hover:not(:disabled):not(.correct):not(.wrong) { border-color: var(--border-hover); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct-text); }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong-text); }
  .opt.dim { opacity: 0.3; }

  .letter {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(160,130,90,0.2); font-size: 11px; color: var(--text-dim);
  }
  .opt.correct .letter { border-color: var(--correct); color: var(--correct-text); background: rgba(90,154,84,0.12); }
  .opt.wrong .letter { border-color: var(--wrong); color: var(--wrong-text); }

  .opera-label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .expl {
    margin-top: 16px; padding: 14px 16px; background: rgba(160,130,90,0.05);
    border-left: 2px solid var(--gold); border-radius: 0 3px 3px 0;
    font-size: 14px; line-height: 1.7; color: var(--text-muted); animation: fadeIn 0.4s ease;
  }
  .expl strong { color: var(--gold-bright); }

  /* Results */
  .r-score { font-size: 42px; font-weight: 400; }
  .r-rank { font-size: 16px; color: var(--gold); font-style: italic; margin-bottom: 30px; }
  .r-item {
    padding: 9px 12px; margin-bottom: 4px; border-radius: 3px; font-size: 14px;
    display: flex; gap: 10px; align-items: center; color: var(--text-muted);
  }
  .r-item.pass { background: rgba(90,154,84,0.05); border-left: 2px solid rgba(90,154,84,0.4); }
  .r-item.fail { background: rgba(160,64,64,0.05); border-left: 2px solid rgba(160,64,64,0.4); }

  .dots { display: flex; gap: 6px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; border: none;
    background: var(--text-dim); opacity: 0.4; transition: all 0.2s ease; cursor: pointer;
  }
  .dot.on { background: var(--gold); opacity: 1; }

  .row { display: flex; gap: 10px; margin-top: 12px; }
  .row .btn { text-align: center; }
  .frow { display: flex; gap: 8px; flex-wrap: wrap; }
  .frow .btn { flex: 1 1 45%; text-align: center; }

  .back-link {
    background: none; border: none; color: var(--text-muted); font-size: 14px;
    cursor: pointer; padding: 0; margin-bottom: 18px; font-family: inherit;
  }
  .muted-sm { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>

<div class="glow"></div>
<div class="wrap" id="app"></div>

<script>
const MOTIFS = [
  { id:"genesis", num:1, name:"Genesis / Nature", opera:"Das Rheingold",
    desc:"The beginning of the world and development of the universe from the primal nothingness.",
    vid:"CzFdrDju4Zw" },
  { id:"ring", num:11, name:"The Ring", opera:"Das Rheingold",
    desc:"The Ring motif — compact, ominous, mutating throughout the cycle.",
    vid:"cZpYG6l6s4A" },
  { id:"valhalla", num:"12a", name:"Valhalla", opera:"Das Rheingold",
    desc:"The majestic theme of the gods' fortress — imposing grandeur built on debt and deception.",
    vid:"Man7MwIHYSw" },
  { id:"sword", num:37, name:"The Sword (Nothung)", opera:"Das Rheingold / Die Walküre",
    desc:"Wotan's enchanted sword, given to Siegmund, shattered by Wotan, reforged by Siegfried.",
    vid:"XhM5UkVVmxA" },
  { id:"curse", num:32, name:"The Curse", opera:"Das Rheingold",
    desc:"Alberich lays a curse on the Ring: everyone will want it, owners will know only sorrow, wearers will die.",
    vid:"7goTVlreE68" },
];

const $ = id => document.getElementById(id);
const app = $('app');
let S = { scr:'menu', qs:[], qi:0, sel:null, show:false, score:0, hist:[], li:0 };

function set(p) { Object.assign(S, p); draw(); }

function shuffle(a) {
  a = [...a];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function hdr() {
  return `<header>
    <div class="kicker">Der Ring des Nibelungen</div>
    <h1>Leitmotif Ear Training</h1>
    <div class="rule"></div>
    <p class="tagline">${MOTIFS.length} motifs · orchestral recordings</p>
  </header>`;
}

function yt(vid, quizMode) {
  const src = `https://www.youtube.com/embed/${vid}?modestbranding=1&rel=0&playsinline=1&fs=0&iv_load_policy=3`;
  if (quizMode) {
    // Cropped: only bottom controls visible — hides title
    return `<div class="yt-quiz"><iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    <p class="yt-hint">Tap the play bar to listen</p>`;
  }
  return `<div class="yt-wrap"><iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
}

// ── SCREENS ──

function drawMenu() {
  app.innerHTML = `${hdr()}
  <div class="screen" style="display:flex;flex-direction:column;gap:10px">
    <button class="btn primary" onclick="startQuiz()">
      <div style="font-size:18px">Test Your Ear</div>
      <div class="muted-sm">Hear the orchestral recording, identify the motif</div>
    </button>
    <button class="btn" onclick="startLearn()">
      <div style="font-size:18px">Learn the Motifs</div>
      <div class="muted-sm">Listen to each motif with descriptions</div>
    </button>
  </div>`;
}

function drawLearn() {
  const m = MOTIFS[S.li];
  app.innerHTML = `${hdr()}
  <div class="screen">
    <button class="back-link" onclick="set({scr:'menu'})">← Back</button>
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <span style="font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim)">${S.li+1} of ${MOTIFS.length}</span>
      <span style="font-size:12px;color:var(--text-muted)">${m.opera}</span>
    </div>
    <div class="card">
      <div class="motif-num">MOTIF ${m.num}</div>
      <h2>${m.name}</h2>
      ${yt(m.vid, false)}
      <p class="desc">${m.desc}</p>
    </div>
    <div class="row">
      <button class="btn" ${S.li===0?'disabled':''} onclick="learnPrev()">← Previous</button>
      <button class="btn" ${S.li===MOTIFS.length-1?'disabled':''} onclick="learnNext()">Next →</button>
    </div>
    <div class="dots">${MOTIFS.map((_,i)=>`<button class="dot${i===S.li?' on':''}" onclick="set({li:${i}})"></button>`).join('')}</div>
  </div>`;
}

function drawQuiz() {
  const q = S.qs[S.qi];
  const r = S.show;
  const pct = ((S.qi + (r?1:0)) / S.qs.length) * 100;

  const opts = q.opts.map((o,i) => {
    const sel = S.sel===i, cor = i===q.ci;
    let c = 'opt', L = String.fromCharCode(65+i);
    if (r && cor) { c+=' correct'; L='✓'; }
    else if (r && sel && !cor) { c+=' wrong'; L='✗'; }
    else if (r && !cor && !sel) { c+=' dim'; }
    return `<button class="${c}" ${r?'disabled':''} onclick="answer(${i})">
      <span class="letter">${L}</span>
      <span><div>${o.name}</div><div class="opera-label">${o.opera}</div></span>
    </button>`;
  }).join('');

  let expl = '';
  if (r) {
    expl = `<div class="expl"><strong>${q.m.name}</strong> — ${q.m.desc}</div>
    <button class="btn primary" style="margin-top:14px;text-align:center" onclick="nextQ()">
      ${S.qi+1>=S.qs.length?'See Results':'Next Motif →'}
    </button>`;
  }

  app.innerHTML = `${hdr()}
  <div class="screen">
    <div class="progress">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-n">${S.qi+1}/${S.qs.length}</span>
    </div>
    <h2 class="question">Which leitmotif is this?</h2>
    ${yt(q.m.vid, true)}
    <div style="height:14px"></div>
    <div class="opts">${opts}</div>
    ${expl}
  </div>`;
}

function drawResults() {
  const pct = Math.round((S.score/S.qs.length)*100);
  const rank = pct===100?'Perfect ear':pct>=60?'Strong — the motifs are taking hold':'Keep listening';
  const em = pct>=80?'🔥':pct>=60?'♪':'🌊';
  const items = S.hist.map(h =>
    `<div class="r-item ${h.ok?'pass':'fail'}">
      <span style="color:${h.ok?'var(--correct-text)':'var(--wrong-text)'};flex-shrink:0">${h.ok?'✓':'✗'}</span>${h.n}
    </div>`).join('');

  app.innerHTML = `${hdr()}
  <div class="screen" style="text-align:center">
    <div style="font-size:48px;margin-bottom:10px;opacity:.75">${em}</div>
    <div class="r-score">${S.score}/${S.qs.length}</div>
    <div class="r-rank">${rank}</div>
    <div style="text-align:left;margin-bottom:24px">${items}</div>
    <div class="frow">
      <button class="btn primary" onclick="startQuiz()">Try Again</button>
      <button class="btn" onclick="startLearn()">Study Motifs</button>
    </div>
  </div>`;
}

function draw() {
  ({menu:drawMenu, learn:drawLearn, quiz:drawQuiz, results:drawResults})[S.scr]();
  window.scrollTo(0, 0);
}

// ── ACTIONS ──

function startQuiz() {
  const sh = shuffle(MOTIFS);
  const qs = sh.map(m => {
    const wr = shuffle(MOTIFS.filter(x=>x.id!==m.id)).slice(0, Math.min(3,MOTIFS.length-1));
    const opts = shuffle([m,...wr]);
    return { m, opts, ci: opts.findIndex(o=>o.id===m.id) };
  });
  set({ scr:'quiz', qs, qi:0, sel:null, show:false, score:0, hist:[] });
}

function startLearn() { set({ scr:'learn', li:0 }); }
function learnPrev() { if(S.li>0) set({li:S.li-1}); }
function learnNext() { if(S.li<MOTIFS.length-1) set({li:S.li+1}); }

function answer(i) {
  if (S.sel!==null) return;
  const q = S.qs[S.qi], ok = i===q.ci;
  set({ sel:i, show:true, score:S.score+(ok?1:0), hist:[...S.hist,{ok, n:q.m.name}] });
}

function nextQ() {
  if (S.qi+1>=S.qs.length) set({scr:'results'});
  else set({ qi:S.qi+1, sel:null, show:false });
}

draw();
</script>
</body>
</html>
